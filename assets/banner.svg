<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#a855f7" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="900" y1="0" x2="900" y2="280"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo box -->
  <rect x="60" y="90" width="60" height="60" rx="14" fill="url(#accent)" filter="url(#glow)"/>
  <text x="90" y="131" text-anchor="middle" font-size="30">⚡</text>

  <!-- Main title -->
  <text x="148" y="126" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">nanoclaw-workspace-ui</text>

  <!-- Subtitle -->
  <text x="148" y="158" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" fill="#888888">Visual file manager for NanoClaw agents · Browse, edit &amp; manage from any browser</text>

  <!-- Feature pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500">
    <rect x="148" y="178" width="100" height="26" rx="13" fill="#1e1e3a"/>
    <text x="198" y="196" text-anchor="middle" fill="#a78bfa">📁 File tree</text>

    <rect x="260" y="178" width="94" height="26" rx="13" fill="#1e1e3a"/>
    <text x="307" y="196" text-anchor="middle" fill="#a78bfa">✏️ Edit files</text>

    <rect x="366" y="178" width="110" height="26" rx="13" fill="#1e1e3a"/>
    <text x="421" y="196" text-anchor="middle" fill="#a78bfa">🌐 CF Tunnel</text>

    <rect x="488" y="178" width="110" height="26" rx="13" fill="#1e1e3a"/>
    <text x="543" y="196" text-anchor="middle" fill="#a78bfa">🔐 Cookie auth</text>
  </g>

  <!-- Right side: terminal mockup -->
  <rect x="760" y="60" width="390" height="170" rx="12" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Terminal title bar -->
  <rect x="760" y="60" width="390" height="32" rx="12" fill="#1a1a1a"/>
  <rect x="760" y="80" width="390" height="12" fill="#1a1a1a"/>
  <circle cx="784" cy="76" r="6" fill="#ff5f57"/>
  <circle cx="804" cy="76" r="6" fill="#febc2e"/>
  <circle cx="824" cy="76" r="6" fill="#28c840"/>
  <text x="900" y="81" text-anchor="middle" font-family="monospace" font-size="12" fill="#555">terminal</text>
  <!-- Terminal content -->
  <text x="780" y="118" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#555">$</text>
  <text x="792" y="118" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#e0e0e0"> npx nanoclaw-workspace-ui</text>
  <text x="780" y="140" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#28c840">🚀 NanoClaw Workspace UI</text>
  <text x="780" y="158" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#666">   Workspace: /workspace/agent</text>
  <text x="780" y="176" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#28c840">✅ Tunnel ready:</text>
  <text x="780" y="194" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a78bfa">   https://random.trycloudflare.com</text>

  <!-- Bottom border accent -->
  <rect x="0" y="276" width="1200" height="4" fill="url(#accent)" opacity="0.4"/>
</svg>
